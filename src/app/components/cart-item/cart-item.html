<div class="cart-item">
  <img
    [src]="item().product.image"
    [alt]="item().product.title"
    class="item-image"
  />

  <div class="item-info">
    <h4 class="item-title">{{ item().product.title | truncate:50 }}</h4>
    <p class="item-category">{{ item().product.category }}</p>
    <p class="item-price">{{ item().product.price | currencyMAD }}</p>
  </div>

  <div class="item-quantity">
    <button class="qty-btn" (click)="onDecrement()">−</button>
    <span class="qty-value">{{ item().quantity }}</span>
    <button class="qty-btn" (click)="onIncrement()">+</button>
  </div>

  <div class="item-subtotal">
    {{ subtotal | currencyMAD }}
  </div>

  <button class="btn-remove" (click)="onRemove()" title="Supprimer">✕</button>
</div>
